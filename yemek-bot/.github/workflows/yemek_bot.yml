name: Yemek Botu

on:
  schedule:
    - cron: '0 7 * * 1-5'   # Her sabah 10:00 TRT (Pzt-Cuma)
    - cron: '30 7 * * 1'    # Pazartesi 10:30 TRT - Menü okuma
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mod'
        type: choice
        options:
          - gunluk_mesaj
          - menu_oku
        default: gunluk_mesaj

permissions:
  contents: write

jobs:
  yemek-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu İndir
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları Yükle
        run: pip install -r requirements.txt

      - name: Modu Belirle
        run: |
          if [ "${{ github.event.schedule }}" = "30 7 * * 1" ] || \
             [ "${{ github.event.inputs.mode }}" = "menu_oku" ]; then
            echo "BOT_MODE=menu_oku" >> $GITHUB_ENV
          else
            echo "BOT_MODE=gunluk_mesaj" >> $GITHUB_ENV
          fi

      - name: Menü Oku (Pazartesi 10:30)
        if: env.BOT_MODE == 'menu_oku'
        env:
          GREEN_API_INSTANCE:  ${{ secrets.GREEN_API_INSTANCE }}
          GREEN_API_TOKEN:     ${{ secrets.GREEN_API_TOKEN }}
          YEMEK_BOT_GROUP_ID:  ${{ secrets.YEMEK_BOT_GROUP_ID }}
        run: python menu_oku.py

      - name: Günlük Mesaj Gönder (10:00)
        if: env.BOT_MODE == 'gunluk_mesaj'
        env:
          GREEN_API_INSTANCE: ${{ secrets.GREEN_API_INSTANCE }}
          GREEN_API_TOKEN:    ${{ secrets.GREEN_API_TOKEN }}
          YEMEK_GROUP_ID:     ${{ secrets.YEMEK_GROUP_ID }}
        run: python yemek_bot.py

      - name: Değişiklikleri Kaydet
        run: |
          git config user.name "Yemek Bot"
          git config user.email "yemek-bot@noreply.github.com"
          git add menu.json yemek_log.txt
          if ! git diff --staged --quiet; then
            git commit -m "Menü/log güncellendi [skip ci]"
            git pull --rebase -X ours origin main
            git push origin HEAD:main
          fi
