name: Kola Sirasi Botu (Twilio)

on:
  schedule:
    - cron: '0 7 * * 4'   # Her Persembe 10:00 TRT (UTC 07:00)
  workflow_dispatch:        # Manuel tetikleme

permissions:
  contents: write

jobs:
  kola-bot-twilio:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Indir
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Twilio Yukle
        run: pip install twilio

      - name: Kola Botunu Calistir
        env:
          TWILIO_ACCOUNT_SID:    ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:     ${{ secrets.TWILIO_AUTH_TOKEN }}
          WHATSAPP_HEDEF_NUMARA: ${{ secrets.WHATSAPP_HEDEF_NUMARA }}
        run: python kola_bot_twilio.py

      - name: Sira Degisikligini Kaydet
        run: |
          git config user.name "Kola Bot"
          git config user.email "kola-bot@noreply.github.com"
          git add index.json bot_log_twilio.txt
          if ! git diff --staged --quiet; then
            git commit -m "Sira guncellendi (Twilio) [skip ci]"
            git pull --rebase -X ours origin master
            git push origin HEAD:master
          fi
