name: 🥤 Kola Sırası Botu

on:
  schedule:
    - cron: '45 6 * * 4'    # Perşembe 09:45 TRT (UTC 06:45) - Gecikme payı ile
    - cron: '55 14 * * 4'  # Perşembe 17:55 TRT (UTC 14:55)
  workflow_dispatch:          # Manuel tetikleme (test için)
    inputs:
      reminder_mode:
        description: 'Hatırlatma modu mu? (akşam mesajı)'
        type: boolean
        default: false

permissions:
  contents: write   # index.json commit etmek için gerekli

jobs:
  kola-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4

      - name: 🐍 Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Bağımlılıkları Yükle
        run: pip install -r requirements.txt

      - name: 🕐 Modu Belirle
        run: |
          if [ "${{ github.event.schedule }}" = "10 15 * * 4" ] || \
             [ "${{ github.event.inputs.reminder_mode }}" = "true" ]; then
            echo "KOLA_REMINDER=true" >> $GITHUB_ENV
            echo "Mod: HATIRLATMA (akşam)"
          else
            echo "KOLA_REMINDER=false" >> $GITHUB_ENV
            echo "Mod: ANA MESAJ (sabah)"
          fi

      - name: 🤖 Kola Botunu Çalıştır
        env:
          GREEN_API_URL:       ${{ secrets.GREEN_API_URL }}
          GREEN_API_MEDIA_URL: ${{ secrets.GREEN_API_MEDIA_URL }}
          GREEN_API_INSTANCE:  ${{ secrets.GREEN_API_INSTANCE }}
          GREEN_API_TOKEN:     ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_GROUP_ID:   ${{ secrets.WHATSAPP_GROUP_ID }}
          GITHUB_RAW_URL:      https://raw.githubusercontent.com/${{ github.repository }}/main
        run: python kola_bot.py

      - name: 💾 Sıra Değişikliğini Kaydet (sadece ana mesaj)
        if: env.KOLA_REMINDER == 'false'
        run: |
          git config user.name "Kola Bot 🤖"
          git config user.email "kola-bot@noreply.github.com"
          git add index.json bot_log.txt
          if ! git diff --staged --quiet; then
            git commit -m "🥤 Sıra güncellendi [skip ci]"
            # Çakışma varsa uzak sunucudaki dosyayı baz alıp bizim değişikliği ekle
            git pull --rebase -X ours origin main
            git push origin HEAD:main
          fi

